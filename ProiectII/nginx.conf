# Aceasta este sectiunea care iti lipsea:
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        # Redirect de la HTTP la HTTPS pe portul tau de proxy (8443)
        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 443 ssl;
        
        # Caile trebuie sa corespunda cu ce ai pus in docker-compose volumes
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        location / {
            # ATENTIE: Aici trebuie sa fie numele serviciului din docker-compose (api)
            proxy_pass http://api:8080; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Foarte important pentru Cookies/Bilet
            proxy_pass_header Set-Cookie;
        }
    }
}